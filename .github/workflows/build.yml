name: Build Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up BakkesMod SDK
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/bakkesmodorg/BakkesModSDK.git _bakkes/bakkesmodsdk
          Expand-Archive _bakkes/bakkesmodsdk/imgui_bm.zip -DestinationPath . -Force
          Copy-Item imgui IMGUI -Recurse -Force
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/ocornut/imgui/master/misc/cpp/imgui_stdlib.h" -OutFile IMGUI/imgui_stdlib.h
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/ocornut/imgui/master/misc/cpp/imgui_stdlib.cpp" -OutFile IMGUI/imgui_stdlib.cpp
          echo "BAKKESMOD_PATH=$PWD\_bakkes" >> $env:GITHUB_ENV

      - name: Build Release x64
        shell: pwsh
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
          & $msbuild CustomMapsPLugin.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:BakkesModPath="$env:BAKKESMOD_PATH\" `
            /p:PlatformToolset=v143

      - name: Rename output DLL
        shell: pwsh
        run: Copy-Item plugins/CustomMapsPLugin.dll plugins/CustomMapsPlugin.dll

      - uses: actions/upload-artifact@v4
        with:
          name: CustomMapsPlugin
          path: plugins/CustomMapsPlugin.dll
